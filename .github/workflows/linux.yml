name: Linux CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]
        include:
          - compiler: gcc
            cxx: g++
            cc: gcc
          - compiler: clang
            cxx: clang++-15
            cc: clang-15
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake build-essential
        sudo apt install -y clang-15 g++-13
    
    - name: Check compiler versions
      run: |
        if [ "${{ matrix.compiler }}" = "gcc" ]; then
          g++ --version
        else
          clang++-15 --version
        fi
    
    - name: Configure
      run: |
        mkdir -p build_${{ matrix.compiler }}_${{ matrix.build_type }}
        cd build_${{ matrix.compiler }}_${{ matrix.build_type }}
        cmake .. -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
- name: Build
      run: |
        cd build_${{ matrix.compiler }}_${{ matrix.build_type }}
        cmake --build . --config ${{ matrix.build_type }}
    
    - name: Test
      run: |
        cd build_${{ matrix.compiler }}_${{ matrix.build_type }}
        ctest --output-on-failure || echo "No tests configured"
